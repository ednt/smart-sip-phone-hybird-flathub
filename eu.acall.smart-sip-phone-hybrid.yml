app-id: eu.acall.smart-sip-phone-hybrid
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: smart-sip-phone-launch

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  # pw-mon: PipeWire-Geraete hotplug (PipeWire_Monitor.pbi)
  - --filesystem=xdg-run/pipewire-0

modules:
  - name: smart-sip-phone
    buildsystem: simple
    build-commands:
      - install -Dm644 alsa-config/conf.d/default.conf /app/etc/alsa/conf.d/default.conf
      - install -Dm755 Smart-SIP-Phone-Hybrid /app/bin/Smart-SIP-Phone-Hybrid
      - install -Dm755 smart-sip-phone-launch.sh /app/bin/smart-sip-phone-launch
      - install -Dm755 extra-bin/ip /app/bin/ip
      - install -Dm755 extra-bin/aplay /app/bin/aplay
      - install -Dm755 extra-bin/arecord /app/bin/arecord
      - install -Dm755 extra-bin/pw-mon /app/bin/pw-mon
      - install -Dm644 eu.acall.smart-sip-phone-hybrid.desktop /app/share/applications/eu.acall.smart-sip-phone-hybrid.desktop
      - install -Dm644 eu.acall.smart-sip-phone-hybrid.metainfo.xml /app/share/metainfo/eu.acall.smart-sip-phone-hybrid.metainfo.xml
      - install -Dm644 Icon512.png /app/share/icons/hicolor/48x48/apps/eu.acall.smart-sip-phone-hybrid.png
      - install -Dm644 Icon512.png /app/share/icons/hicolor/64x64/apps/eu.acall.smart-sip-phone-hybrid.png
      - install -Dm644 Icon512.png /app/share/icons/hicolor/128x128/apps/eu.acall.smart-sip-phone-hybrid.png
      - install -Dm644 Icon512.png /app/share/icons/hicolor/256x256/apps/eu.acall.smart-sip-phone-hybrid.png
      - install -Dm644 Icon512.png /app/share/icons/hicolor/512x512/apps/eu.acall.smart-sip-phone-hybrid.png
      - gtk-update-icon-cache -f -t /app/share/icons/hicolor
      - mkdir -p /app/lib
      - cp -a extra-libs/. /app/lib/
    sources:
      - type: archive
        url: https://github.com/ednt/smart-sip-phone-hybrid-flathub/releases/download/v1.7.0/smart-sip-phone-hybrid-1.7.0-flathub-4.tar.xz
        sha256: e967a18a5a73846b5c2855e674e1c856dfee07c329e3980b71ebd9c573fea7c0
        strip-components: 0
